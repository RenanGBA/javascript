<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript - Aula 01</title>
</head>
<body>
    <div>
        <button onclick="somar()">Somar</button>
        <button onclick="multiplicar()">Multiplicar</button> 
    </div>
    <div>
        <div>
            <input type="number" name="n1_soma" id="n1_soma">
            <span>+</span>
            <input type="number" name="n2_soma" id="n2_soma">
            <button onclick="somarInputs()">Somar</button>
        </div>
        <div id="resultado_soma"></div>
    </div>

    <div>
        <div>
            <input type="number" name="n1_mult" id="n1_mult">
            <span>+</span>
            <input type="number" name="n2_mult" id="n2_mult">
            <button onclick="multiplicarInputs()">Multiplicar</button>
        </div>
        <div id="resultado_mult"></div>
    </div>
    <script src="aula_01.js"></script>
</body>
</html>
